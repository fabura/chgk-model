name: schema-docs

on:
  push:
    paths:
      - 'docs/schema/**'
      - 'website/build/build_db.py'
      - 'website/build/map_tables.py'
      - 'venue_overlay/store.py'
      - 'rating_api/pg_state.py'
      - 'data.py'
      - 'scripts/check_schema_docs.py'
      - 'tests/test_schema_docs.py'
  pull_request:
    paths:
      - 'docs/schema/**'
      - 'website/build/build_db.py'
      - 'website/build/map_tables.py'
      - 'venue_overlay/store.py'
      - 'rating_api/pg_state.py'
      - 'data.py'
      - 'scripts/check_schema_docs.py'
      - 'tests/test_schema_docs.py'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python scripts/check_schema_docs.py
      - run: pip install -r requirements.txt && python -m pytest tests/test_schema_docs.py -q
