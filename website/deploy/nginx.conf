# Reverse proxy for the ChGK Model website.
#
# Loaded into the nginx:1.27-alpine container as
# /etc/nginx/conf.d/default.conf, replacing the default welcome page.

# Light gzip — Tailwind/Plotly come from CDNs, but our HTML benefits.
gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml;

upstream chgk_app {
    # docker-compose service name; resolves via the bridge network.
    server app:8000;
    keepalive 16;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # /admin/* is protected by ADMIN_TOKEN inside the app, so no nginx-level
    # restriction is needed.  (Real client IP isn't visible in the docker
    # bridge anyway, so allow/deny would be cargo-culted.)

    client_max_body_size 4m;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;

    location / {
        proxy_pass http://chgk_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}
