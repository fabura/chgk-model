# Reverse proxy for the ChGK Model website.
#
# Loaded into the nginx:1.27-alpine container as
# /etc/nginx/conf.d/default.conf, replacing the default welcome page.
#
# Architecture: Cloudflare in front (proxy ON, SSL/TLS = Full (strict)).
#   browser ──TLS:443──▶ Cloudflare ──TLS:8443──▶ this nginx
# Origin port 443 on the host is intentionally NOT used (occupied by
# amnezia-xray VPN); CF reaches us on 8443 instead, which is one of the
# allowed origin ports for Cloudflare proxied traffic.

# Light gzip — Tailwind/Plotly come from CDNs, but our HTML benefits.
gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml;

upstream chgk_app {
    # docker-compose service name; resolves via the bridge network.
    server app:8000;
    keepalive 16;
}

# ---- Real client IP from Cloudflare -------------------------------------
# Without this, $remote_addr is the Cloudflare edge IP.  Trust the
# documented CF ranges and pull the originating IP from CF-Connecting-IP.
# https://www.cloudflare.com/ips/
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;
real_ip_header CF-Connecting-IP;
real_ip_recursive on;

# ---- Port 80: ACME challenge (legacy) + redirect to HTTPS ---------------
# Cloudflare in "Full (strict)" mode would normally use 443 → 8443 only,
# but we also keep port 80 open for the rare HTTP probe and to make
# direct-IP debugging easier.  Real users never hit port 80 because CF
# rewrites them to HTTPS at the edge.
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name chgk.quest www.chgk.quest _;

    location / {
        return 301 https://chgk.quest$request_uri;
    }
}

# ---- Port 8443: HTTPS origin for Cloudflare -----------------------------
server {
    listen 8443 ssl;
    listen [::]:8443 ssl;
    http2 on;
    server_name chgk.quest;

    # Cloudflare Origin Certificate (15-year, free, issued in CF dashboard).
    # Files placed on the host at /srv/chgk-model/cf-origin/{cert,key}.pem
    # and bind-mounted into the container at /etc/nginx/cf-origin/.
    ssl_certificate     /etc/nginx/cf-origin/cert.pem;
    ssl_certificate_key /etc/nginx/cf-origin/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    client_max_body_size 4m;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;

    location / {
        proxy_pass http://chgk_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # CF terminates TLS, so the app sees this as https.
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
    }
}

# www → apex redirect.
server {
    listen 8443 ssl;
    listen [::]:8443 ssl;
    server_name www.chgk.quest;

    ssl_certificate     /etc/nginx/cf-origin/cert.pem;
    ssl_certificate_key /etc/nginx/cf-origin/key.pem;

    return 301 https://chgk.quest$request_uri;
}
