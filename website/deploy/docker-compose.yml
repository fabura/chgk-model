# ChGK Model — production stack.
#
# Layout (on the server, default DEPLOY_DIR=/srv/chgk-model):
#   docker-compose.yml   — this file
#   nginx.conf           — vhost config (bind-mounted into the nginx container)
#   .env                 — ADMIN_TOKEN=...  (NEVER commit; chmod 600)
#   data/chgk.duckdb     — DB file (rsynced from a workstation)
#   cf-origin/cert.pem   — Cloudflare Origin Certificate (paste from CF dashboard)
#   cf-origin/key.pem    — Cloudflare Origin private key (chmod 600)
#
# We sit BEHIND Cloudflare:
#   browser ──TLS:443──▶ Cloudflare ──TLS:8443──▶ this nginx
# Origin port 443 on the host is not used (busy with amnezia-xray).
#
# Bring up:
#   docker compose up -d
#
# Tail logs (access lines include rt=/urt= request timings from nginx):
#   docker compose logs -f --tail=200 nginx
#   docker compose logs -f --tail=200 app
#
# Log rotation: Docker json-file driver caps total size per service
# (see logging: below); nginx access/error go to stdout/stderr via nginx-main.conf.

services:
  app:
    image: chgk-model:latest
    container_name: chgk-app
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    environment:
      - ADMIN_TOKEN=${ADMIN_TOKEN:?ADMIN_TOKEN must be set in .env}
      - CHGK_DB_PATH=/app/data/chgk.duckdb
    volumes:
      # DB file is bind-mounted read-only from the host.  Replace it with
      # rsync (atomic via --inplace + mv); then either call /admin/reload-db
      # or `docker compose restart app` to pick up the new file.
      - ./data:/app/data:ro
    networks:
      - web
    expose:
      - "8000"

  nginx:
    image: nginx:1.27-alpine
    container_name: chgk-nginx
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "7"
    ports:
      - "80:80"
      - "8443:8443"
    volumes:
      - ./nginx-main.conf:/etc/nginx/nginx.conf:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./cf-origin:/etc/nginx/cf-origin:ro
    depends_on:
      - app
    networks:
      - web

networks:
  web:
    driver: bridge
